

mybatis.mapper-locations=classpath:mappers/*xml
mybatis.type-aliases-package=com.example.api.mybatis.entity
server.port=8081
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/message_board?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
mybatis-plus.configuration.log-prefix=org.apache.ibatis.logging.stdout.StdOutImpl