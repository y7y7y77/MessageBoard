# Docker 环境配置（覆盖 application.properties 中的对应项）
# 数据库连接指向 docker-compose 中的 db 服务
spring.datasource.url=jdbc:mysql://db:3306/message_board?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root

# 关闭 DevTools 热重载（生产不需要）
spring.devtools.restart.enabled=false

# 关闭 SQL 日志打印（减少生产日志噪音）
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.nologging.NoLoggingImpl
