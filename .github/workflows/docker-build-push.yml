name: Build and Push to Alibaba Cloud ACR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: crpi-rl603f46y0u1n0zb.cn-shanghai.personal.cr.aliyuncs.com
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  IMAGE_NAME: messageboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Alibaba Cloud ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin ${{ env.REGISTRY }}

      - name: Build Docker image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}"
          docker build \
            -t "${IMAGE_TAG}:${{ github.sha }}" \
            -t "${IMAGE_TAG}:latest" \
            .

      - name: Push Docker image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}"
          docker push "${IMAGE_TAG}:${{ github.sha }}"
          docker push "${IMAGE_TAG}:latest"
